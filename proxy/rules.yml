version: 1

# The third field is a logical target, not a Clash proxy group name.
# Map logical targets to local Clash groups in:
#   %APPDATA%/io.github.clash-verge-rev.clash-verge-rev/codex-proxy-targets.yml
prepend-rules:
  - DOMAIN-SUFFIX,linkedin.com,proxy
  - DOMAIN-SUFFIX,licdn.com,proxy
  - DOMAIN-SUFFIX,lnkd.in,proxy
  - DOMAIN-SUFFIX,linkedin-ei.com,proxy
  - DOMAIN-SUFFIX,chatgpt.com,fallback
  - DOMAIN-SUFFIX,openai.com,fallback
  - DOMAIN-SUFFIX,oaistatic.com,fallback
  - DOMAIN-SUFFIX,oaiusercontent.com,fallback
